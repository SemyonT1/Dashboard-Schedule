version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: rasp
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./dump.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://postgres:admin123@db:5432/rasp?sslmode=disable
      - PORT=8080
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    image: node:18-alpine
    working_dir: /Dashboard_Schedule
    volumes:
      - ./frontend:/Dashboard_Schedule
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
